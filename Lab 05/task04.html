<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4</title>
</head>

<body>
    <form action="#">
        <table>
            <tr>
                <td>
                    <label for="">Name:</label>
                </td>
                <td>
                    <input type="text" name="" id="name">
                    <span id="nameErr" style="color: red;"></span>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="gender">Gender:</label>
                </td>
                <td>
                    <input type="radio" name="gender" id="gender">Male <br>
                    <input type="radio" name="gender" id="gender">Female

                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Email:</label>
                </td>
                <td>

            </tr>
            <tr>
                <td>
                    <label for="">Address:</label>
                </td>
                <td>
                    <input type="text" name="" id="address">

                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Login ID:</label>
                </td>
                <td>
                    <input type="text" name="" id="login">
                    <span id="loginErr" style="color: red;"></span>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Password:</label>
                </td>
                <td>
                    <input type="password" name="" id="password">
                    <span id="passwordErr" style="color: red;"></span>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Agreed with policy:</label>
                </td>
                <td>
                    <input type="checkbox" name="" id="agreement">
                    <span id="agreementErr" style="color: red;"></span>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" name="" id="" onclick="checkEvent()">
                    <input type="reset" name="" id="">
                </td>
            </tr>

        </table>

    <script src="task04.js"></script>
